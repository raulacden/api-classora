openapi: 3.0.3
info:
  title: Prices Service API
  description: REST API for querying applicable product prices by application date, product, and brand.
  version: 1.0.0
servers:
  - url: /
    description: Current server
paths:
  /api/v1/prices:
    get:
      summary: Get the applicable product price
      description: Returns the applicable price for the provided application date, product, and brand.
      operationId: getApplicablePrice
      tags:
        - Prices
      parameters:
        - name: applicationDate
          in: query
          required: true
          description: Date and time when the price must be applied.
          schema:
            type: string
            format: date-time
            example: "2020-06-14T10:00:00"
        - name: productId
          in: query
          required: true
          description: Product identifier.
          schema:
            type: integer
            format: int64
            example: 35455
        - name: brandId
          in: query
          required: true
          description: Brand identifier.
          schema:
            type: integer
            format: int64
            example: 1
      responses:
        "200":
          description: Applicable price found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PriceResponse"
              example:
                productId: 35455
                brandId: 1
                priceList: 1
                startDate: "2020-06-14T00:00:00"
                endDate: "2020-12-31T23:59:59"
                price: 35.50
                currency: EUR
        "400":
          description: Invalid or missing query parameters.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: No applicable price exists for the provided criteria.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Unexpected internal server error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
components:
  schemas:
    PriceResponse:
      type: object
      description: Applicable product price.
      required:
        - productId
        - brandId
        - priceList
        - startDate
        - endDate
        - price
        - currency
      properties:
        productId:
          type: integer
          format: int64
          description: Product identifier.
          example: 35455
        brandId:
          type: integer
          format: int64
          description: Brand identifier.
          example: 1
        priceList:
          type: integer
          format: int64
          description: Price list identifier.
          example: 1
        startDate:
          type: string
          format: date-time
          description: Start date and time for the price validity period.
          example: "2020-06-14T00:00:00"
        endDate:
          type: string
          format: date-time
          description: End date and time for the price validity period.
          example: "2020-12-31T23:59:59"
        price:
          type: number
          description: Final applicable price amount.
          example: 35.50
        currency:
          type: string
          description: ISO 4217 currency code.
          example: EUR
    ErrorResponse:
      type: object
      description: Error response details.
      required:
        - timestamp
        - status
        - error
        - message
        - path
      properties:
        timestamp:
          type: string
          format: date-time
          description: Date and time when the error occurred.
          example: "2020-06-14T10:00:00"
        status:
          type: integer
          format: int32
          description: HTTP status code.
          example: 400
        error:
          type: string
          description: HTTP error reason.
          example: Bad Request
        message:
          type: string
          description: Error message.
          example: Invalid or missing query parameter.
        path:
          type: string
          description: Request path.
          example: /api/v1/prices
